openapi: 3.0.3
info:
  title: devos.ing Server API
  version: 0.1.0
  description: Implemented HTTP routes for the Express-backed server.
servers:
  - url: http://localhost:3001
tags:
  - name: Health
  - name: CLI
  - name: Read Models
  - name: Board
  - name: Notifications
paths:
  /health:
    get:
      tags: [Health]
      responses:
        '200':
          description: Server health.
  /api/cli/history:
    get:
      tags: [CLI]
      responses:
        '200':
          description: In-memory CLI execution history.
  /api/cli/dispatch:
    post:
      tags: [CLI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CliDispatchRequest'
      responses:
        '200':
          description: CLI dispatch result.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/token-usage:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Token usage rows.
  /api/jobs:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Job rows.
  /api/command-history:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Command history rows.
  /api/agents:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Created agent.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/agents/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Agent row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Updated agent.
        '400':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted agent.
  /api/skills:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill rows.
    post:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Created skill.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/skills/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Skill row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
      responses:
        '200':
          description: Updated skill.
        '400':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      responses:
        '204':
          description: Deleted skill.
  /api/projects:
    get:
      tags: [Board]
      responses:
        '200':
          description: Project rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Created project.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Project row.
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Updated project.
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted project.
  /api/tasks:
    get:
      tags: [Board]
      responses:
        '200':
          description: Task rows.
    post:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created task.
  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      responses:
        '200':
          description: Task row.
    patch:
      tags: [Board]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Updated task.
    delete:
      tags: [Board]
      responses:
        '200':
          description: Deleted task.
  /api/workspaces/{workspaceId}/projects:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace projects.
  /api/workspaces/{workspaceId}/projects/{projectId}/board:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Board]
      responses:
        '200':
          description: Workspace project board.
  /api/notifications:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationServerRequest'
      responses:
        '202':
          description: Notification accepted.
  /api/notifications/email:
    post:
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationEmailRequest'
      responses:
        '200':
          description: Notification email sent.
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        minLength: 1
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    TypedError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TypedError'
  schemas:
    TypedError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    CliDispatchRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          minLength: 1
      additionalProperties: true
    AgentCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, backend, model, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    AgentUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/AgentPatchFields'
        - minProperties: 1
    AgentPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    SkillCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, description, source, updatedAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    SkillUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SkillPatchFields'
        - minProperties: 1
    SkillPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    ProjectCreateRequest:
      type: object
      additionalProperties: false
      required: [boardId, name, ownerId]
      properties:
        boardId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1 }
        externalProjectId: { type: string, nullable: true }
        description: { type: string, nullable: true }
    ProjectUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/ProjectPatchFields'
        - minProperties: 1
    ProjectPatchFields:
      type: object
      additionalProperties: false
      properties:
        boardId: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1 }
        externalProjectId: { type: string, nullable: true }
        description: { type: string, nullable: true }
    TaskCreateRequest:
      type: object
      additionalProperties: false
      required: [projectId, title, content, priority, status, creatorId]
      properties:
        projectId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        content: { type: string, minLength: 1 }
        priority: { type: integer }
        status: { type: string, minLength: 1 }
        creatorId: { type: string, minLength: 1 }
        dueDate: { type: string, nullable: true }
        linkedPr: { type: string, nullable: true }
    TaskUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/TaskPatchFields'
        - minProperties: 1
    TaskPatchFields:
      type: object
      additionalProperties: false
      properties:
        projectId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        content: { type: string, minLength: 1 }
        priority: { type: integer }
        status: { type: string, minLength: 1 }
        creatorId: { type: string, minLength: 1 }
        dueDate: { type: string, nullable: true }
        linkedPr: { type: string, nullable: true }
    EmailPayload:
      type: object
      additionalProperties: false
      required: [from, to, subject, text]
      properties:
        from: { type: string }
        to:
          type: array
          items: { type: string }
        subject: { type: string }
        text: { type: string }
    RunState:
      type: object
      additionalProperties: true
      required: [projectId, projectName, updatedAt, issue]
      properties:
        projectId: { type: string }
        projectName: { type: string }
        updatedAt: { type: string }
        issue:
          type: object
          additionalProperties: true
          required: [key, title, url]
          properties:
            key: { type: string }
            title: { type: string }
            url: { type: string }
    NotificationServerRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type, payload]
          properties:
            type: { type: string, enum: [task-outcome] }
            payload:
              $ref: '#/components/schemas/EmailPayload'
        - type: object
          additionalProperties: false
          required: [type, payload, complexityScore, reason]
          properties:
            type: { type: string, enum: [human-review-required] }
            payload:
              $ref: '#/components/schemas/EmailPayload'
            complexityScore: { type: number }
            reason: { type: string, minLength: 1 }
    NotificationEmailRequest:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type, state, outcome]
          properties:
            type: { type: string, enum: [task_outcome] }
            state:
              $ref: '#/components/schemas/RunState'
            outcome: { type: string, enum: [done, blocked] }
            errorMessage: { type: string }
        - type: object
          additionalProperties: false
          required: [type, state, complexityScore, reason]
          properties:
            type: { type: string, enum: [human_review_required] }
            state:
              $ref: '#/components/schemas/RunState'
            complexityScore: { type: number }
            reason: { type: string, minLength: 1 }
